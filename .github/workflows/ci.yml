name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Use npm 11.8.0
        run: |
          corepack enable
          corepack prepare npm@11.8.0 --activate
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Unit tests
        run: npm run test:unit

      - name: UI tests
        run: npm run test:ui

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate package manifests
        run: npm run pack:check

      - name: Smoke test packed install
        run: npm run smoke:install
