<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .bacG {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 60%;
      height: 70%;
      border-style: solid;
      border-width: 1px;
      border-radius: 15px;
      box-shadow: 5px 5px 10px 1px rgb(0, 0, 0);
    }

    .TaskName {
      margin-top: 10px;
      margin-bottom: 50px;
      font-size: 30px;
      text-align: center;
      width: 100%;
    }

    .countDown {
      margin-bottom: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 60px;
      background-color: rgb(188, 3, 255);
      width: 50%;
      height: 20%;
      color: white;
      border-radius: 15px;
      box-shadow: 0 0 10px 1px rgb(0, 0, 0);
      transition: all 0.25s ease-in-out;
    }

    .status {
      text-align: center;
      font-size: 30px;
      width: 100%;
      margin-bottom: 30px;
    }

    .inputArea {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50%;
    }

    .TN {
      margin: 10px;
      padding: 15px;
      font-size: 15px;
      border-radius: 15px;
      border-width: 2px;
    }

    .Time {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 70%;
    }

    .Time input {
      flex: 1;
    }

    button {
      margin-top: 15px;
      width: 20%;
      height: 50px;
      font-size: 25px;
      border-radius: 15px;
      border-width: 1px;
      background-color: rgb(255, 255, 255);
      cursor: pointer;
    }

    .btnGroup {
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      width: 100%;
      gap: 5px;
    }

    .btnGroup button {
      font-size: medium;
      width: 10%;
    }

    .Stop {
      background-color: brown;
    }
  </style>
  <body>
    <div class="bacG">
      <div class="TaskName">Workname</div>
      <div class="countDown">00:00</div>
      <div class="status">Resting</div>
      <div class="inputArea">
        <input class="TN" type="text" placeholder="Task Name" />
        <br />
        <select name="time" id="time" title="time">
          <option value="15">15 Minutes</option>
          <option value="25">25 Minutes</option>
          <option value="30">30 Minutes</option>
          <option value="45">45 Minutes</option>
          <option value="60">60 Minutes</option>
        </select>
      </div>
      <button class="Start">Start</button>
      <button class="Stop">Stop</button>
      <div class="btnGroup"></div>
    </div>

    <!------------------------JavaScript----------------------------->

    <script>
      const bacG = document.querySelector(".bacG");
      const btnGroup = document.querySelector(`.btnGroup`);
      const TaskName = document.querySelector(".TaskName");
      const countDown = document.querySelector(".countDown");
      const status = document.querySelector(".status");
      const time = document.querySelector("#time");
      const Start = document.querySelector(".Start");
      const Stop = document.querySelector(`.Stop`);
      const TN = document.querySelector(".TN"); //task name input
      const Restart = document.createElement(`button`);
      const Rest = document.createElement(`button`);
      let Continue = false;
      let Timer;
      let minute;
      let second = 0;

      Stop.disabled = true;
      //format time display
      const formatTwoDigits = (n) => (n < 10 ? "0" : "") + n;
      Restart.innerHTML = `Restart`;
      Rest.innerHTML = `Rest`;

      //start count down
      function startCount() {
        btnGroup.appendChild(Restart);
        btnGroup.appendChild(Rest);
        Start.disabled = true;
        Stop.disabled = false;
        TaskName.innerHTML = TN.value || `Work`;
        status.innerHTML = "Working";
        countDown.style.backgroundColor = `brown`;
        TN.value = ``;
        if (!Continue) {
          minute = time.value;
        }
        statTimer();
      }

      //click start button
      Start.addEventListener("click", () => {
        startCount();

        Restart.addEventListener(`click`, () => {
          Continue = false;
          second = 0;
          clearInterval(Timer);
          startCount();
        });
        //set rest time
        Rest.addEventListener(`click`, () => {
          clearInterval(Timer);
          Start.disabled = false;
          Start.innerHTML = `Start`;
          TaskName.innerHTML = `Workname`;
          status.innerHTML = `Resting`;
          countDown.style.backgroundColor = `rgb(188, 3, 255)`;
          countDown.innerHTML = `00:00`;
          btnGroup.removeChild(Restart);
          btnGroup.removeChild(Rest);
        });
      });

      //count down function
      function statTimer() {
        countDown.innerHTML = `${minute}:${formatTwoDigits(second)}`;
        Timer = setInterval(function () {
          countDown.innerHTML = `${formatTwoDigits(minute)}:${formatTwoDigits(second)}`;
          second--;
          if (second < 0) {
            minute--;
            second = 59;
          }
        }, 1000);
        if (minute === 0) {
          clearInterval(Timer);
          Start.disabled = false;
          Continue = false;
          countDown.style.backgroundColor = rgb(188, 3, 255);
        }
      }

      //click stop button
      Stop.addEventListener(`click`, (e) => {
        Start.disabled = false;
        Start.innerHTML = `continue`;
        Continue = true;
        Stop.disabled = true;
        clearInterval(Timer);
      });
    </script>
  </body>
</html>
